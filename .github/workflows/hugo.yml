\f0\fs24 \cf0 name: Deploy Hugo site to Pages\
\
on:\
  push:\
    branches: ["main"] # \uc0\u30830 \u35748 \u20320 \u30340 \u20027 \u20998 \u25903 \u21517 \u31216 \u26159  main \u36824 \u26159  master\
\
permissions:\
  contents: read\
  pages: write\
  id-token: write\
\
concurrency:\
  group: "pages"\
  cancel-in-progress: false\
\
jobs:\
  build:\
    runs-on: ubuntu-latest\
    steps:\
      - name: Checkout\
        uses: actions/checkout@v4\
        with:\
          submodules: recursive # \uc0\u22914 \u26524 \u20320 \u30340 \u20027 \u39064 \u26159 \u20316 \u20026  submodule \u28155 \u21152 \u30340 \u65292 \u36825 \u34892 \u33267 \u20851 \u37325 \u35201 \
          fetch-depth: 0\
\
      - name: Setup Hugo\
        uses: peaceiris/actions-hugo@v3\
        with:\
          hugo-version: 'latest'\
          extended: true # \uc0\u24314 \u35758 \u24320 \u21551 \u65292 \u35768 \u22810 \u29616 \u20195 \u20027 \u39064 \u38656 \u35201  extended \u29256 \u26412 \u22788 \u29702  Sass/SCSS\
\
      - name: Build with Hugo\
        run: hugo --minify\
\
      - name: Upload artifact\
        uses: actions/upload-pages-artifact@v3\
        with:\
          path: ./public # Hugo \uc0\u40664 \u35748 \u29983 \u25104 \u30340 \u38745 \u24577 \u25991 \u20214 \u30446 \u24405 \
\
  deploy:\
    environment:\
      name: github-pages\
      url: $\{\{ steps.deployment.outputs.page_url \}\}\
    runs-on: ubuntu-latest\
    needs: build\
    steps:\
      - name: Deploy to GitHub Pages\
        id: deployment\
        uses: actions/deploy-pages@v4}